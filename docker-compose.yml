services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/chicloon/ai-for-developers-project-386/api:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/root/data/call_booking.db?_foreign_keys=on&_journal_mode=WAL}
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-minimum-32-characters-long}
    volumes:
      - ./data:/root/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        API_PROXY_URL: http://api:8080
        BUILD_SHA: local
    image: ghcr.io/chicloon/ai-for-developers-project-386/web:latest
    environment:
      API_PROXY_URL: "http://api:8080"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
