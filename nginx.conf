events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    upstream web {
        server web:3000;
    }

    upstream api {
        server api:8080;
    }

    # call.chicloon.ru: ACME + редирект на HTTPS (имя должно быть в сертификате)
    server {
        listen 80;
        server_name call.chicloon.ru;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # chicloon.ru / www: ACME + редирект на HTTPS
    server {
        listen 80;
        server_name chicloon.ru www.chicloon.ru;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Локально / по IP без TLS
    server {
        listen 80 default_server;
        server_name _;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location /_next/static {
            proxy_pass http://web;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name chicloon.ru www.chicloon.ru call.chicloon.ru;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location /_next/static {
            proxy_pass http://web;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
