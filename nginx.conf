events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    
    upstream web {
        server web:3000;
    }
    
    upstream api {
        server api:8080;
    }
    
    server {
        listen 80;
        # chicloon.ru + cal.chicloon.ru: у регистратора — A/CNAME для cal на тот же endpoint; при HTTPS добавьте cal.chicloon.ru в сертификат там, где терминируется TLS.
        server_name chicloon.ru cal.chicloon.ru;
        
        # Next.js pages (static)
        location /_next/static {
            proxy_pass http://web;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable";
        }

        # API: same origin in browser; bypass Next.js rewrites
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Next.js app
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
