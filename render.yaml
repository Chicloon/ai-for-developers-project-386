# Render Blueprint: API (Go) + Web (Next.js) + Postgres в одном проекте.
#
# Подключение: https://dashboard.render.com/blueprints → New Blueprint → репозиторий и ветка с этим файлом.
# Если в аккаунте уже есть Postgres с именем call-booking-db, Render подхватит его в Blueprint.
# Внешняя БД (Supabase): удалите блок databases и задайте DATABASE_URL вручную (sync: false + fromDatabase убрать).
#
# Публичный URL для пользователей — у call-booking-web. API: /health и /api/* на URL сервиса API.

databases:
  - name: call-booking-db
    region: frankfurt
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: call-booking-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: call-booking-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: call-booking-web
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: API_PROXY_URL
        fromService:
          name: call-booking-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
